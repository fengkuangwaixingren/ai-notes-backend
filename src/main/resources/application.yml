spring:
  application:
    name: demo

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ainotes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect



  data:
    redis:
      host: ${REDIS_HOST:192.168.13.128}   #虚拟机地址
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}

  cache:
    type: redis
  ai:
    dashscope:
      # 建议通过环境变量提供，避免把真实 Key 写入仓库
      # Windows PowerShell: $env:AI_DASHSCOPE_API_KEY="sk-xxxx"
      api-key: ${AI_DASHSCOPE_API_KEY:sk-37b77be8b97b45d1904eb3b38d179624}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080

jwt:
  secret: "abcdefghijklmnopqrstuvwxyz0123456789"
  expiration: 86400000  # 24小时，单位毫秒